<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Транзакции — Finely</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #7cff67;
      --pink: #f0a3cc;
      --yellow: #ffbb29;
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --muted: #666;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, .logo { font-family: 'Syne', sans-serif; }

    /* Canvas aurora background */
    #aurora-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.2;
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.8);
      backdrop-filter: blur(20px);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--green), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; }

    .nav-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 9px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--green); background: rgba(124,255,103,0.07); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-user {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 8px;
    }

    .btn-logout {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .btn-logout:hover { color: var(--text); background: rgba(255,255,255,0.04); }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .page-sub { font-size: 0.875rem; color: var(--muted); }

    /* Filters */
    .filters {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .filters-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 640px) {
      .filters-row {
        flex-direction: row;
      }
    }

    .search-input {
      flex: 2;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(124,255,103,0.1);
    }

    .search-input::placeholder {
      color: #333;
    }

    /* Date inputs */
    .date-input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .date-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(124,255,103,0.1);
    }

    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    /* Order dropdown */
    .order-dropdown {
      min-width: 120px;
    }

    /* Custom Dropdown - улучшенная версия без скроллбара */
    .custom-dropdown {
      position: relative;
      width: 100%;
    }

    @media (min-width: 640px) {
      .custom-dropdown {
        width: auto;
        min-width: 160px;
      }
    }

    .custom-dropdown-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px;
      padding-right: 40px;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s;
    }

    .custom-dropdown-trigger:hover {
      border-color: #333;
    }

    .custom-dropdown-trigger:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(124,255,103,0.1);
    }

    .custom-dropdown-trigger svg {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--muted);
    }

    .custom-dropdown-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      overflow: hidden;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .custom-dropdown-panel::-webkit-scrollbar {
      display: none;
    }

    .custom-dropdown-panel[hidden] {
      display: none;
    }

    .custom-dropdown-option {
      display: block;
      width: 100%;
      padding: 12px 16px;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .custom-dropdown-option:hover {
      background: #1a1a1a;
    }

    .custom-dropdown-option.selected {
      background: rgba(124,255,103,0.1);
      color: var(--green);
    }

    /* Action button */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .btn-primary {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #000;
      background: var(--green);
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #8fff7a;
      box-shadow: 0 0 30px rgba(124,255,103,0.4);
      transform: translateY(-2px);
    }

    /* Table Card */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 16px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #0d0d0d;
    }

    td {
      padding: 14px 16px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .tx-amount {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      text-align: right;
    }

    .tx-amount.income {
      color: var(--green);
    }

    .tx-amount.expense {
      color: var(--pink);
    }

    .delete-btn {
      font-size: 0.8rem;
      color: var(--pink);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .delete-btn:hover {
      background: rgba(240,163,204,0.1);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }

    /* Pagination */
    .pagination {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pagination-btn {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 400px;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal p {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #aaa;
    }

    .form-group input {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: #333;
    }

    .btn-submit {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #000;
      background: var(--green);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .btn-submit:hover {
      background: #8fff7a;
      box-shadow: 0 0 30px rgba(124,255,103,0.3);
    }

    .btn-delete {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #000;
      background: var(--pink);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .btn-delete:hover {
      background: #ff99cc;
      box-shadow: 0 0 30px rgba(240,163,204,0.3);
    }

    .btn-loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-loading .btn-text {
      visibility: hidden;
    }

    .btn-loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      font-size: 0.85rem;
      padding: 14px 20px;
      border-radius: 12px;
      backdrop-filter: blur(12px);
      animation: toastIn 0.3s ease;
      border: 1px solid;
    }

    .toast.success {
      background: rgba(124,255,103,0.1);
      border-color: rgba(124,255,103,0.25);
      color: var(--green);
    }

    .toast.error {
      background: rgba(240,163,204,0.1);
      border-color: rgba(240,163,204,0.25);
      color: var(--pink);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="aurora-canvas"></canvas>
  <div id="toast-container"></div>

  <div class="content">
    <!-- NAV -->
    <nav>
      <div class="nav-inner">
        <a href="home.html" class="logo">Finely</a>
        <div class="nav-links">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="transactions.html" class="nav-link active">Transactions</a>
          <a href="categories.html" class="nav-link">Categories</a>
        </div>
        <div class="nav-right">
          <span id="user-login" class="nav-user"></span>
          <button id="btn-logout" class="btn-logout">Выход</button>
        </div>
      </div>
    </nav>

    <main>
      <div class="page-header">
        <h1 class="page-title">Транзакции</h1>
        <p class="page-sub">Управление доходами и расходами</p>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="filters-row">
          <input type="search" id="filter-search" placeholder="Поиск по названию..." class="search-input">

          <div class="custom-dropdown" data-dropdown>
            <input type="hidden" id="filter-type" value="">
            <button type="button" class="custom-dropdown-trigger" aria-expanded="false">
              <span class="custom-dropdown-value">Все типы</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="custom-dropdown-panel" hidden>
              <button type="button" class="custom-dropdown-option selected" data-value="">Все типы</button>
              <button type="button" class="custom-dropdown-option" data-value="income">Доход</button>
              <button type="button" class="custom-dropdown-option" data-value="expense">Расход</button>
            </div>
          </div>

          <div class="custom-dropdown" data-dropdown id="filter-category-dropdown">
            <input type="hidden" id="filter-category" value="">
            <button type="button" class="custom-dropdown-trigger" aria-expanded="false">
              <span class="custom-dropdown-value">Все категории</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="custom-dropdown-panel" hidden>
              <button type="button" class="custom-dropdown-option selected" data-value="">Все категории</button>
            </div>
          </div>
        </div>

        <div class="filters-row">
          <input type="date" id="filter-date-from" class="date-input" placeholder="Дата с">
          <input type="date" id="filter-date-to" class="date-input" placeholder="Дата по">
          
          <div class="custom-dropdown order-dropdown" data-dropdown>
            <input type="hidden" id="filter-order" value="desc">
            <button type="button" class="custom-dropdown-trigger" aria-expanded="false">
              <span class="custom-dropdown-value">Сначала новые</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="custom-dropdown-panel" hidden>
              <button type="button" class="custom-dropdown-option selected" data-value="desc">Сначала новые</button>
              <button type="button" class="custom-dropdown-option" data-value="asc">Сначала старые</button>
            </div>
          </div>

          <button type="button" id="filter-reset" class="btn-secondary" style="padding: 14px 24px;">Сброс</button>
        </div>
      </div>

      <!-- Action Button -->
      <div class="action-bar">
        <button type="button" id="btn-create" class="btn-primary">+ Новая транзакция</button>
      </div>

      <!-- Transactions Table -->
      <div class="table-card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Название</th>
                <th>Тип</th>
                <th>Категория</th>
                <th class="tx-amount">Сумма</th>
                <th>Дата</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="transactions-tbody">
              <tr><td colspan="6" class="empty-state">Загрузка…</td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination" class="pagination"></div>
      </div>
    </main>
  </div>

  <!-- Create Modal -->
  <div id="modal-create" class="modal-backdrop">
    <div class="modal">
      <h3>Новая транзакция</h3>
      <form id="form-create" class="modal-form">
        <div class="form-group">
          <label for="create-name">Название</label>
          <input type="text" id="create-name" required minlength="5" maxlength="30">
        </div>
        <div class="form-group">
          <label for="create-amount">Сумма</label>
          <input type="number" id="create-amount" required min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Тип</label>
          <div class="custom-dropdown" data-dropdown>
            <input type="hidden" id="create-type" value="income">
            <button type="button" class="custom-dropdown-trigger" aria-expanded="false">
              <span class="custom-dropdown-value">Доход</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="custom-dropdown-panel" hidden>
              <button type="button" class="custom-dropdown-option selected" data-value="income">Доход</button>
              <button type="button" class="custom-dropdown-option" data-value="expense">Расход</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Категория</label>
          <div class="custom-dropdown" data-dropdown id="create-category-dropdown">
            <input type="hidden" id="create-category" value="" required>
            <button type="button" class="custom-dropdown-trigger" aria-expanded="false">
              <span class="custom-dropdown-value">Выберите категорию</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="custom-dropdown-panel" hidden>
              <button type="button" class="custom-dropdown-option selected" data-value="">Выберите категорию</button>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="create-cancel" class="btn-secondary">Отмена</button>
          <button type="submit" id="create-submit" class="btn-submit">
            <span class="btn-text">Создать</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="modal-delete" class="modal-backdrop">
    <div class="modal">
      <h3>Удалить транзакцию?</h3>
      <p id="delete-transaction-info"></p>
      <div class="modal-actions">
        <button type="button" id="delete-cancel" class="btn-secondary">Отмена</button>
        <button type="button" id="delete-confirm" class="btn-delete">
          <span class="btn-text">Удалить</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Aurora canvas animation
    const canvas = document.getElementById('aurora-canvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    const blobs = [];

    const colors = [
      { r: 124, g: 255, b: 103 },
      { r: 240, g: 163, b: 204 },
      { r: 255, g: 187, b: 41 },
      { r: 124, g: 255, b: 103 },
    ];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initBlobs() {
      blobs.length = 0;
      for (let i = 0; i < 4; i++) {
        const c = colors[i];
        blobs.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: 280 + Math.random() * 180,
          color: c,
          phase: Math.random() * Math.PI * 2,
          speed: 0.003 + Math.random() * 0.004,
        });
      }
    }

    function drawAurora() {
      ctx.clearRect(0, 0, W, H);
      blobs.forEach(b => {
        b.phase += b.speed;
        b.x += b.vx + Math.sin(b.phase) * 0.4;
        b.y += b.vy + Math.cos(b.phase * 0.7) * 0.3;
        if (b.x < -b.r) b.x = W + b.r;
        if (b.x > W + b.r) b.x = -b.r;
        if (b.y < -b.r) b.y = H + b.r;
        if (b.y > H + b.r) b.y = -b.r;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, `rgba(${b.color.r},${b.color.g},${b.color.b},0.15)`);
        grad.addColorStop(0.5, `rgba(${b.color.r},${b.color.g},${b.color.b},0.05)`);
        grad.addColorStop(1, `rgba(${b.color.r},${b.color.g},${b.color.b},0)`);
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });
      requestAnimationFrame(drawAurora);
    }

    resize();
    initBlobs();
    drawAurora();
    window.addEventListener('resize', resize);

    // API и логика
    const API_BASE = 'http://127.0.0.1:8000';
    const PAGE_SIZE = 10;

    function getTokens() {
      return { access: localStorage.getItem('access_token'), refresh: localStorage.getItem('refresh_token') };
    }
    function redirectAuth() { location.replace('auth.html'); }

    async function refreshTokens() {
      const { refresh } = getTokens();
      if (!refresh) return null;
      const r = await fetch(API_BASE + '/api/v1/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh }),
      });
      if (!r.ok) return null;
      const data = await r.json();
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      return data.access_token;
    }

    async function fetchWithAuth(url, options = {}) {
      let token = getTokens().access;
      if (!token) { redirectAuth(); return; }
      options.headers = { ...options.headers, Authorization: `Bearer ${token}` };
      let r = await fetch(API_BASE + url, options);
      if (r.status === 401) {
        token = await refreshTokens();
        if (!token) { redirectAuth(); return; }
        options.headers.Authorization = `Bearer ${token}`;
        r = await fetch(API_BASE + url, options);
      }
      if (r.status === 401) { redirectAuth(); return; }
      return r;
    }

    function toast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function setLoading(btn, loading) {
      if (loading) {
        btn.classList.add('btn-loading');
        btn.disabled = true;
      } else {
        btn.classList.remove('btn-loading');
        btn.disabled = false;
      }
    }

    function formatMoney(n) {
      return new Intl.NumberFormat('ru-RU', { style: 'decimal', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n) + ' ₽';
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return new Intl.DateTimeFormat('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(d);
    }
    
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    if (!getTokens().access) redirectAuth();

    let categories = [];
    let currentPage = 1;
    let lastPageLength = 0;
    let deleteTargetId = null;
    let deleteTargetName = '';

    function buildQuery(skip) {
      const params = new URLSearchParams();
      
      const search = document.getElementById('filter-search').value.trim();
      const type = document.getElementById('filter-type').value;
      const cat = document.getElementById('filter-category').value;
      const dateFrom = document.getElementById('filter-date-from').value;
      const dateTo = document.getElementById('filter-date-to').value;
      const order = document.getElementById('filter-order').value;
      
      if (search) params.set('search', search);
      if (type) params.set('transaction_type', type);
      if (cat) params.set('category_id', cat);
      if (dateFrom) params.set('date_from', dateFrom);
      if (dateTo) params.set('date_to', dateTo);
      if (order) params.set('order', order);
      
      params.set('skip', String(skip ?? (currentPage - 1) * PAGE_SIZE));
      params.set('limit', String(PAGE_SIZE));
      
      return '?' + params.toString();
    }

    function resetFilters() {
      document.getElementById('filter-search').value = '';
      document.getElementById('filter-type').value = '';
      document.getElementById('filter-category').value = '';
      document.getElementById('filter-date-from').value = '';
      document.getElementById('filter-date-to').value = '';
      document.getElementById('filter-order').value = 'desc';
      
      // Reset dropdown displays
      document.querySelectorAll('.custom-dropdown').forEach(wrap => {
        const input = wrap.querySelector('input[type="hidden"]');
        const valueEl = wrap.querySelector('.custom-dropdown-value');
        if (input && valueEl) {
          const selectedOption = wrap.querySelector('.custom-dropdown-option.selected');
          if (selectedOption) {
            valueEl.textContent = selectedOption.textContent.trim();
          }
        }
      });
      
      currentPage = 1;
      loadTransactions();
    }

    function setDropdownOptions(inputId, options, selectedValue) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const wrap = input.closest('.custom-dropdown');
      if (!wrap) return;
      const panel = wrap.querySelector('.custom-dropdown-panel');
      const valueEl = wrap.querySelector('.custom-dropdown-value');
      const val = selectedValue !== undefined ? String(selectedValue) : (input.value || (options[0] ? String(options[0].value) : ''));
      panel.innerHTML = options.map(o => `<button type="button" class="custom-dropdown-option" data-value="${String(o.value).replace(/"/g, '&quot;')}">${escapeHtml(o.label)}</button>`).join('');
      const toSelect = Array.from(panel.querySelectorAll('.custom-dropdown-option')).find(o => o.dataset.value === val) || panel.firstElementChild;
      if (toSelect) {
        toSelect.classList.add('selected');
        input.value = toSelect.dataset.value;
        valueEl.textContent = toSelect.textContent.trim();
      }
    }

    async function loadCategories() {
      const r = await fetchWithAuth('/api/v1/category/?limit=200');
      if (!r) return;
      categories = r.ok ? await r.json() : [];
      setDropdownOptions('filter-category', [
        { value: '', label: 'Все категории' },
        ...categories.map(c => ({ 
          value: c.id, 
          label: c.name + ' (' + (c.category_type === 'income' ? 'доход' : 'расход') + ')' 
        }))
      ]);
      filterCreateCategoriesByType();
    }

    function filterCreateCategoriesByType() {
      const type = document.getElementById('create-type').value;
      const opts = categories.filter(c => c.category_type === type).map(c => ({ value: c.id, label: c.name }));
      setDropdownOptions('create-category', [{ value: '', label: 'Выберите категорию' }, ...opts], '');
    }

    async function loadTransactions() {
      const skip = (currentPage - 1) * PAGE_SIZE;
      const r = await fetchWithAuth('/api/v1/transactions/' + buildQuery(skip));
      if (!r) return;
      const list = r.ok ? await r.json() : [];
      lastPageLength = list.length;
      const catMap = Object.fromEntries(categories.map(c => [c.id, c.name]));

      const tbody = document.getElementById('transactions-tbody');
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет транзакций</td></tr>';
      } else {
        tbody.innerHTML = list.map(t => `
          <tr>
            <td class="tx-name">${escapeHtml(t.name)}</td>
            <td class="tx-type">${t.transaction_type === 'income' ? 'Доход' : 'Расход'}</td>
            <td class="tx-category">${escapeHtml(catMap[t.category_id] || '—')}</td>
            <td class="tx-amount ${t.transaction_type === 'income' ? 'income' : 'expense'}">
              ${t.transaction_type === 'income' ? '+' : '−'} ${formatMoney(t.amount)}
            </td>
            <td class="tx-date">${formatDate(t.created_at)}</td>
            <td><button type="button" data-delete-id="${t.id}" data-delete-name="${escapeHtml(t.name)}" class="delete-btn">Удалить</button></td>
          </tr>
        `).join('');
        tbody.querySelectorAll('[data-delete-id]').forEach(btn => {
          btn.onclick = () => openDeleteModal(
            parseInt(btn.dataset.deleteId, 10),
            btn.dataset.deleteName
          );
        });
      }
      renderPagination();
    }

    function renderPagination() {
      const div = document.getElementById('pagination');
      const hasPrev = currentPage > 1;
      const hasNext = lastPageLength >= PAGE_SIZE;
      if (!hasPrev && !hasNext) {
        div.innerHTML = '';
        return;
      }
      
      let html = '';
      if (hasPrev) {
        html += `<button type="button" data-page="${currentPage - 1}" class="pagination-btn">← Назад</button>`;
      }
      html += `<span class="pagination-info">Страница ${currentPage}</span>`;
      if (hasNext) {
        html += `<button type="button" data-page="${currentPage + 1}" class="pagination-btn">Вперёд →</button>`;
      }
      
      div.innerHTML = html;
      div.querySelectorAll('[data-page]').forEach(btn => {
        btn.onclick = () => {
          currentPage = parseInt(btn.dataset.page, 10);
          loadTransactions();
        };
      });
    }

    function openDeleteModal(id, name) {
      deleteTargetId = id;
      deleteTargetName = name;
      document.getElementById('delete-transaction-info').textContent = `Транзакция «${name}» будет удалена.`;
      document.getElementById('modal-delete').classList.add('show');
    }

    function closeDeleteModal() {
      deleteTargetId = null;
      deleteTargetName = '';
      document.getElementById('modal-delete').classList.remove('show');
    }

    async function deleteTransaction() {
      if (!deleteTargetId) return;
      
      const btn = document.getElementById('delete-confirm');
      setLoading(btn, true);
      
      const r = await fetchWithAuth('/api/v1/transactions/' + deleteTargetId, { method: 'DELETE' });
      
      setLoading(btn, false);
      closeDeleteModal();
      
      if (!r) return;
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        toast(d.detail || 'Ошибка', 'error');
        return;
      }
      
      toast('Транзакция удалена');
      loadTransactions();
    }

    function initDropdowns() {
      document.querySelectorAll('.custom-dropdown').forEach(wrap => {
        const input = wrap.querySelector('input[type="hidden"]');
        const trigger = wrap.querySelector('.custom-dropdown-trigger');
        const panel = wrap.querySelector('.custom-dropdown-panel');
        const valueEl = wrap.querySelector('.custom-dropdown-value');
        if (!trigger || !panel || !input) return;
        
        trigger.onclick = (e) => {
          e.stopPropagation();
          const isOpen = !panel.hidden;
          document.querySelectorAll('.custom-dropdown-panel').forEach(p => { p.hidden = true; });
          document.querySelectorAll('.custom-dropdown-trigger').forEach(t => { t.setAttribute('aria-expanded', 'false'); });
          if (!isOpen) {
            panel.hidden = false;
            trigger.setAttribute('aria-expanded', 'true');
          }
        };
        
        wrap.addEventListener('click', (e) => {
          const opt = e.target.closest('.custom-dropdown-option');
          if (!opt || !panel.contains(opt)) return;
          e.stopPropagation();
          const val = opt.dataset.value;
          input.value = val;
          valueEl.textContent = opt.textContent.trim();
          panel.hidden = true;
          trigger.setAttribute('aria-expanded', 'false');
          wrap.querySelectorAll('.custom-dropdown-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          
          if (input.id === 'filter-type' || input.id === 'filter-category' || input.id === 'filter-order') {
            currentPage = 1;
            loadTransactions();
          }
          if (input.id === 'create-type') {
            filterCreateCategoriesByType();
          }
        });
      });
      
      document.addEventListener('click', () => {
        document.querySelectorAll('.custom-dropdown-panel').forEach(p => { p.hidden = true; });
        document.querySelectorAll('.custom-dropdown-trigger').forEach(t => { t.setAttribute('aria-expanded', 'false'); });
      });
    }

    // Инициализация
    initDropdowns();

    document.getElementById('filter-search').oninput = () => {
      currentPage = 1;
      loadTransactions();
    };

    document.getElementById('filter-date-from').onchange = () => {
      currentPage = 1;
      loadTransactions();
    };

    document.getElementById('filter-date-to').onchange = () => {
      currentPage = 1;
      loadTransactions();
    };

    document.getElementById('filter-reset').onclick = resetFilters;

    document.getElementById('btn-create').onclick = () => {
      filterCreateCategoriesByType();
      document.getElementById('create-name').value = '';
      document.getElementById('create-amount').value = '';
      document.getElementById('modal-create').classList.add('show');
    };
    
    document.getElementById('create-cancel').onclick = () => {
      document.getElementById('modal-create').classList.remove('show');
    };

    document.getElementById('delete-cancel').onclick = closeDeleteModal;
    document.getElementById('delete-confirm').onclick = deleteTransaction;

    document.getElementById('form-create').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('create-submit');
      setLoading(btn, true);
      
      const name = document.getElementById('create-name').value.trim();
      const amount = parseFloat(document.getElementById('create-amount').value, 10);
      const transaction_type = document.getElementById('create-type').value;
      const category_id = parseInt(document.getElementById('create-category').value, 10);
      
      const r = await fetchWithAuth('/api/v1/transactions/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, amount, transaction_type, category_id }),
      });
      
      setLoading(btn, false);
      if (!r) return;
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        toast(d.detail || 'Ошибка', 'error');
        return;
      }
      
      toast('Транзакция создана');
      document.getElementById('modal-create').classList.remove('show');
      currentPage = 1;
      loadTransactions();
    };

    document.getElementById('btn-logout').onclick = () => {
      const refresh = getTokens().refresh;
      if (refresh) {
        fetch(API_BASE + '/api/v1/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refresh })
        }).catch(() => {});
      }
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      location.href = 'auth.html';
    };

    (async () => {
      // Загрузка профиля
      const profileRes = await fetchWithAuth('/api/v1/profile');
      if (profileRes?.ok) {
        const user = await profileRes.json();
        document.getElementById('user-login').textContent = user.login;
      }
      
      await loadCategories();
      await loadTransactions();
    })();
  </script>
</body>
</html>
